<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obscura | Serverless Encryption</title>
    <link rel="stylesheet" href="style.css">
    <!-- QR Code Generation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Crypto Module -->
    <script src="crypto.js"></script>
</head>
<body>
    <div id="app">
        <!-- SETUP VIEW: Generate Identity -->
        <div id="setup-view" class="glass-card fade-in">
            <h1>Obscura</h1>
            <p class="subtitle">Truly serverless, client-side encryption.</p>
            
            <div style="text-align: center; margin-bottom: 20px;">
                <p style="font-size: 0.9rem; color: var(--text-dim);">To begin, create your digital identity. Your keys never leave this device.</p>
            </div>

            <button id="btn-generate" class="btn btn-primary">
                Generate My Identity
            </button>
        </div>

        <!-- DASHBOARD VIEW: My Keys & Contacts -->
        <div id="dashboard-view" class="glass-card fade-in hidden">
            <h1>Identity Hub</h1>
            <p class="subtitle">Share your QR code to pair with others.</p>
            
            <div id="identity-qr-container">
                <!-- QR Code will be rendered here -->
            </div>
            
            <div style="text-align: center;">
                <label>Your Public Identity Hash</label>
                <div id="my-public-key" class="key-badge">...</div>
            </div>

            <div class="input-group">
                <label>Recipient's Public Key</label>
                <input type="text" id="recipient-key-input" placeholder="Paste or scan recipient hash">
            </div>

            <button id="btn-start-chat" class="btn btn-primary">
                Compose Secure Message
            </button>

            <button id="btn-reset" class="btn btn-secondary" style="margin-top: 10px; padding: 10px; font-size: 0.8rem;">
                Reset My Identity
            </button>
        </div>

        <!-- MESSAGING VIEW: Encrypt & Decrypt -->
        <div id="messaging-view" class="glass-card fade-in hidden">
            <h1 id="chat-title">Secure Inbox</h1>
            
            <div id="decryption-section" class="hidden" style="margin-bottom: 30px;">
                <label>Incoming Message Detected</label>
                <div class="chat-container" id="inbox-container">
                    <!-- Decrypted message will appear here -->
                </div>
            </div>

            <div class="input-group">
                <label>Your Secret Message</label>
                <textarea id="message-input" rows="4" placeholder="Type something private..."></textarea>
            </div>

            <button id="btn-encrypt-share" class="btn btn-primary">
                Encrypt & Generate Share Link
            </button>

            <div id="share-link-container" class="hidden" style="margin-top: 20px;">
                <label>Secure Share Link</label>
                <input type="text" id="share-link-output" readonly>
                <p style="font-size: 0.7rem; color: var(--accent-secondary); margin-top: 5px;">Copy this link and send it via any channel.</p>
            </div>

            <button id="btn-back" class="btn btn-secondary" style="margin-top: 20px;">
                Back to Dashboard
            </button>
        </div>

        <div class="footer-text">
            Protected by <span>AES-GCM-256</span> + <span>RSA-OAEP-2048</span>
        </div>
    </div>

    <!-- Main Logic -->
    <script src="app.js"></script>
</body>
</html>
