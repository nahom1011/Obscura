<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obscura | Shared Identity Messaging</title>
    <meta name="description" content="Secure, serverless encrypted messaging using a shared identity model.">
    <link rel="stylesheet" href="style.css">
    <!-- No external libs needed for core crypto! -->
    <script src="crypto.js"></script>
</head>
<body>
    <main id="app">
        <header class="glass-card fade-in">
            <h1>Obscura</h1>
            <p class="subtitle">Shared Identity Encryption</p>
        </header>

        <!-- IDENTITY MANAGEMENT -->
        <section id="identity-section" class="glass-card fade-in">
            <label>Your Shared Identity (user_id)</label>
            <div id="display-user-id" class="key-badge">Loading...</div>
            
            <div class="btn-group">
                <button id="btn-copy-id" class="btn btn-secondary">📋 Copy Identity</button>
                <button id="btn-reset-id" class="btn btn-danger">🧨 Reset</button>
            </div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--glass-border);">

            <div class="input-group">
                <label>Pair with Device (Import Identity)</label>
                <input type="text" id="import-id-input" placeholder="Paste partner's user_id here">
                <button id="btn-import-id" class="btn btn-secondary" style="margin-top: 10px;">Connect Identity</button>
            </div>
        </section>

        <!-- INBOX (AUTO DECRYPT) -->
        <section id="inbox-section" class="glass-card fade-in hidden">
            <label>🔓 Decrypted Message Detected</label>
            <div id="decrypted-output" class="chat-container">
                <!-- Message will appear here -->
            </div>
        </section>

        <!-- COMPOSER -->
        <section id="composer-section" class="glass-card fade-in">
            <div class="input-group">
                <label>Compose Secure Message</label>
                <textarea id="message-input" rows="4" placeholder="Type your secret message..."></textarea>
            </div>
            
            <button id="btn-encrypt" class="btn btn-primary">Encrypt & Generate Link</button>

            <div id="link-container" class="hidden" style="margin-top: 20px;">
                <label>Shareable Link</label>
                <input type="text" id="share-link-output" readonly>
                <p class="note">Direct recipients with the same identity can view this.</p>
                <button id="btn-copy-link" class="btn btn-secondary" style="margin-top: 10px; width: auto; padding: 10px 15px;">📋 Copy Link</button>
            </div>
        </section>

        <footer class="footer-text">
            Serverless & Anonymous. Powered by <span>AES-256 (GCM)</span>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
